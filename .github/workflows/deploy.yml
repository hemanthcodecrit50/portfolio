name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: 13.233.247.152
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /var/www/portfolio
            git pull origin main
            sudo systemctl restart nginx
